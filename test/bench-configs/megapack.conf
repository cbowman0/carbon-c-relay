# 10 Aggregation rules with variance and percentiles
aggregate ^test\.server1\.(.*)
    every 10 seconds
    expire after 30 seconds
    timestamp at start of bucket
    compute variance write to test.aggr.server1.\1.var
    compute percentile95 write to test.aggr.server1.\1.p95
    send to blackhole;
