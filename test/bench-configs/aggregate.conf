cluster blackhole
    type blackhole;

# High-cardinality aggregation: exercises P10 (memmove), P11 (hash table), P12 (pipe writes)
aggregate ^(test\.[^.]+\.)
    every 10 seconds
    expire after 30 seconds
    timestamp at start of bucket
    compute sum write to \1sum
    compute max write to \1max
    compute min write to \1min
    send to blackhole;

match *
    send to blackhole;
