# High-cardinality aggregation: exercises P10 (bucket memmove),
# P11 (hash table sizing), P12 (unbatched pipe writes)
aggregate ^(test\.[^.]+\.)
    every 10 seconds
    expire after 30 seconds
    timestamp at start of bucket
    compute sum write to \1sum
    compute max write to \1max
    compute min write to \1min
    send to blackhole;

match *
    send to blackhole;
