# Case 1: Group-less regex in aggregation (Original Issue 465)
aggregate host\.b[0-9]+\.component1\.c
    every 60 seconds expire after 120 seconds
    timestamp at start of bucket
    compute average write to aggregation.component1.c
    send to blackhole;

# Case 2: Regex with one group in aggregation
aggregate host\.b[0-9]+\.(.+)\.c
    every 60 seconds expire after 120 seconds
    timestamp at start of bucket
    compute average write to aggregation.\1.c
    send to blackhole;

# Case 3: Regex with nested groups in rewrite
rewrite ^(prefix)\.([a-z]+(\.[0-9]+))\.(suffix)$
    into \4.\3.\2.\1;

# Case 4: Regex matching middle part in rewrite
rewrite middle
    into center;

# Case 5: Literal match in rewrite
rewrite "exact.match"
    into "replacement.match";

# Case 6: Starts with match in rewrite
rewrite ^start\.
    into begin.;

# Case 7: Ends with match in rewrite
rewrite \.end$
    into .finish;

# Case 8: Contains match in rewrite
rewrite \.inner\.
    into .core.;

match * send to blackhole;
